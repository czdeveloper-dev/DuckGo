<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuckGo</title>
    <link rel="stylesheet" href="http://duckgo.local/main.css">
    <link rel="stylesheet" href="http://duckgo.local/controls/List/List.css">
    <link rel="stylesheet" href="http://duckgo.local/controls/FileUploader/FileUploader.css">
    <link rel="stylesheet" href="http://duckgo.local/features/Profiles/Profiles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div id="app">
        <div id="main-area">
            <!-- Sidebar loaded via fragment -->
            <div data-include="http://duckgo.local/layouts/Sidebar/Sidebar.html"></div>

            <!-- Page Container -->
            <div id="page-container">
                <div class="page-view active" data-view-name="profiles" id="view-profiles" data-include="http://duckgo.local/features/Profiles/Profiles.html"></div>
                <div class="page-view" data-view-name="proxies" id="view-proxies"></div>
                <div class="page-view" data-view-name="groups" id="view-groups"></div>
                <div class="page-view" data-view-name="tags" id="view-tags"></div>
                <div class="page-view" data-view-name="automation" id="view-automation"></div>
                <div class="page-view" data-view-name="extensions" id="view-extensions"></div>
                <div class="page-view" data-view-name="logs" id="view-logs"></div>
                <div class="page-view" data-view-name="analytics" id="view-analytics"></div>
                <div class="page-view" data-view-name="security" id="view-security"></div>
                <div class="page-view" data-view-name="schedule" id="view-schedule"></div>
                <div class="page-view" data-view-name="settings" id="view-settings"></div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <!-- Controls CSS -->
    <link rel="stylesheet" href="http://duckgo.local/controls/Button/Button.css">
    <link rel="stylesheet" href="http://duckgo.local/controls/Modal/Modal.css">
    <link rel="stylesheet" href="http://duckgo.local/controls/Dropdown/Dropdown.css">
    <link rel="stylesheet" href="http://duckgo.local/controls/Input/Input.css">
    <link rel="stylesheet" href="http://duckgo.local/controls/Select/Select.css">
    <link rel="stylesheet" href="http://duckgo.local/controls/Table/Table.css">
    <link rel="stylesheet" href="http://duckgo.local/controls/Badge/Badge.css">
    <link rel="stylesheet" href="http://duckgo.local/controls/Panel/Panel.css">
    <link rel="stylesheet" href="http://duckgo.local/controls/ComboBox/ComboBox.css">
    <link rel="stylesheet" href="http://duckgo.local/controls/InlineButton/InlineButton.css">
    <link rel="stylesheet" href="http://duckgo.local/controls/ContextMenu/ContextMenu.css">
    <link rel="stylesheet" href="http://duckgo.local/controls/Checkbox/Checkbox.css">
    <link rel="stylesheet" href="http://duckgo.local/controls/Autocomplete/Autocomplete.css">
    <link rel="stylesheet" href="http://duckgo.local/controls/Textarea/Textarea.css">
    <link rel="stylesheet" href="http://duckgo.local/controls/Tooltip/Tooltip.css">

    <!-- Feature CSS -->
    <link rel="stylesheet" href="http://duckgo.local/features/Profiles/Profiles.css">

    <!-- Scripts - MUST be at end of body so DOM is ready -->
    <script src="http://duckgo.local/core/utils.js"></script>
    <script src="http://duckgo.local/core/store.js"></script>
    <script src="http://duckgo.local/core/bridge.js"></script>
    <script src="http://duckgo.local/layouts/MainLayout.js"></script>
    <script src="http://duckgo.local/layouts/Sidebar/Sidebar.js"></script>

    <!-- Controls Scripts (must load before feature scripts) -->
    <script src="http://duckgo.local/controls/Modal/Modal.js"></script>
    <script src="http://duckgo.local/controls/Dropdown/Dropdown.js"></script>
    <script src="http://duckgo.local/controls/Button/Button.js"></script>
    <script src="http://duckgo.local/controls/Input/Input.js"></script>
    <script src="http://duckgo.local/controls/Select/Select.js"></script>
    <script src="http://duckgo.local/controls/Badge/Badge.js"></script>
    <script src="http://duckgo.local/controls/Checkbox/Checkbox.js"></script>
    <script src="http://duckgo.local/controls/Table/Table.js"></script>
    <script src="http://duckgo.local/controls/Panel/Panel.js"></script>
    <script src="http://duckgo.local/controls/ComboBox/ComboBox.js"></script>
    <script src="http://duckgo.local/controls/InlineButton/InlineButton.js"></script>
    <script src="http://duckgo.local/controls/ContextMenu/ContextMenu.js"></script>
    <script src="http://duckgo.local/controls/Autocomplete/Autocomplete.js"></script>
    <script src="http://duckgo.local/controls/Textarea/Textarea.js"></script>
    <script src="http://duckgo.local/controls/Tooltip/Tooltip.js"></script>

    <!-- Modal Scripts -->
    <script src="http://duckgo.local/features/Profiles/ProfileModal/ClearCache/ClearCache.js"></script>
    <script src="http://duckgo.local/features/Profiles/ProfileModal/NewFingerprint/NewFingerprint.js"></script>
    <script src="http://duckgo.local/features/Profiles/ProfileModal/SetBrowserVersion/SetBrowserVersion.js"></script>
    <script src="http://duckgo.local/features/Profiles/ProfileModal/ChangeLocation/ChangeLocation.js"></script>
    <script src="http://duckgo.local/features/Profiles/ProfileModal/ChangeBookmark/ChangeBookmark.js"></script>
    <script src="http://duckgo.local/features/Profiles/ProfileModal/UpdateStartUrl/UpdateStartUrl.js"></script>
    <script src="http://duckgo.local/features/Profiles/ProfileModal/CustomizeColumn/CustomizeColumn.js"></script>
    <script src="http://duckgo.local/controls/FileUploader/FileUploader.js"></script>
    <script src="http://duckgo.local/features/Profiles/ProfileModal/ImportProfiles/ImportProfiles.js"></script>
    <script src="http://duckgo.local/features/Profiles/ProfileModal/ExportProfiles/ExportProfiles.js"></script>
    <script src="http://duckgo.local/features/Profiles/ProfileModal/CompareProfiles/CompareProfiles.js"></script>

    <!-- Feature Scripts (must load before app.js) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="http://duckgo.local/features/Profiles/Profiles.js"></script>
    <script src="http://duckgo.local/features/Proxies/Proxies.js"></script>
    <script src="http://duckgo.local/features/Groups/Groups.js"></script>
    <script src="http://duckgo.local/features/Tags/Tags.js"></script>
    <script src="http://duckgo.local/features/Automation/Automation.js"></script>
    <script src="http://duckgo.local/features/Logs/Logs.js"></script>
    <script src="http://duckgo.local/features/Settings/Settings.js"></script>

    <!-- App Core -->
    <script src="http://duckgo.local/core/app.js"></script>

    <!-- Bootstrap -->
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                await window.DuckLayout.init();
                await window.DuckApp.init();
                console.log('[DuckGo] Application ready');
            } catch (e) {
                console.error('[DuckGo] Initialization failed:', e);
            }
        });
    </script>
</body>
</html>
