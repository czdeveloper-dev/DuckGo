    <!-- Bootstrap -->
    <script>
        window.onerror = function(msg, src, line, col, err) {
            document.body.innerHTML = '<div style="padding:32px;font-family:monospace;color:red;background:#fff;position:fixed;inset:0;z-index:99999;overflow:auto;"><h2>JS Error</h2><pre>' + msg + '\n\nFile: ' + src + '\nLine: ' + line + ':' + col + '\n\n' + (err && err.stack ? err.stack : '') + '</pre></div>';
        };
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                // IMPORTANT: Init bridge first, then layout, then app
                await window.DuckBridge.init();
                await window.DuckLayout.init();
                await window.DuckApp.init();
            } catch (e) {
                document.body.innerHTML = '<div style="padding:32px;font-family:monospace;color:red;background:#fff;position:fixed;inset:0;z-index:99999;overflow:auto;"><h2>Init Error</h2><pre>' + e.message + '\n\n' + (e.stack || '') + '</pre></div>';
            }
        });
